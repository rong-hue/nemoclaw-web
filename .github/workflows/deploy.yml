name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler@4.78.0
        env:
          npm_config_registry: https://registry.npmjs.org

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy .vercel/output/static --project-name=nemoclaw-web --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 6864e703b29af8f7cd02cee7a023511d
